[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
shadowpool = "Cf3vfadbcvDxaCGsdmKzaNFAVjn8ZGsB4J2rjpncRZkn"

[programs.devnet]
shadowpool = "Cf3vfadbcvDxaCGsdmKzaNFAVjn8ZGsB4J2rjpncRZkn"

[registry]
url = "https://api.apr.dev"

# The committed cluster stays as "localnet" so `yarn test` spins its own
# local validator as before. When running against devnet, override via
# env var:  ANCHOR_PROVIDER_URL="https://devnet.helius-rpc.com/?api-key=..."
# or pass  --rpc-url / --provider.cluster  on the CLI.
[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
